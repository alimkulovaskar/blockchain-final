specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AMM
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: AMM
      startBlock: 10877700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - LiquidityEvent
        - ProtocolStats
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: Swap(indexed address,address,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./src/amm.ts
  - kind: ethereum
    name: DeFiGovernor
    network: sepolia
    source:
      address: "0x87A4FD656a5337014fFa31CeBC1Ef709FAD8D6C1"
      abi: DeFiGovernor
      startBlock: 10877700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - ProtocolStats
      abis:
        - name: DeFiGovernor
          file: ./abis/DeFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/governor.ts
  - kind: ethereum
    name: Vault
    network: sepolia
    source:
      address: "0xeAcE26701a6ee1DD2Efaf4e5A687c004B3c7d4C5"
      abi: Vault
      startBlock: 10877700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - ProtocolStats
      abis:
        - name: Vault
          file: ./abis/Vault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
      file: ./src/vault.ts